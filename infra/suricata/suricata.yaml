%YAML 1.1
---
# Lighthouse Suricata configuration
# Captures flows on the Docker bridge and writes eve.json with flow records
# that the detector bridge maps to CIC 2017 feature vectors.

vars:
  address-groups:
    HOME_NET: "[172.28.0.0/24]"
    EXTERNAL_NET: "!$HOME_NET"
  port-groups:
    HTTP_PORTS: "80"
    HTTPS_PORTS: "443"
    SSH_PORTS: "22"

default-log-dir: /var/log/suricata/

# Global stats (required in Suricata 8 to avoid counters warning)
stats:
  enabled: yes
  interval: 8

# ── Outputs ──────────────────────────────────────────────────────
outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      # community-id lets a Suricata alert be matched to the Zeek flow for the
      # same connection (Zeek emits the same community-id). In the Zeek-primary
      # topology Suricata is the signatures-only layer; ML flow features come
      # from Zeek, so we no longer emit `flow` records here.
      community-id: true
      community-id-seed: 0
      types:
        - alert:
            payload: no
            packet: no
            metadata: yes
            tagged-packets: no
        - stats:
            enabled: yes
            totals: yes
            threads: no
            deltas: no

  - fast:
      enabled: yes
      filename: fast.log
      append: yes

  - stats:
      enabled: yes
      filename: stats.log
      append: yes
      totals: yes

# ── Capture ───────────────────────────────────────────────────────
af-packet:
  - interface: docker0
    threads: auto
    cluster-id: 99
    cluster-type: cluster_flow
    defrag: yes
    use-mmap: yes
    tpacket-v3: yes

pcap:
  - interface: docker0

# ── Detection engine ──────────────────────────────────────────────
detect:
  profile: medium
  custom-values:
    toclient-groups: 3
    toserver-groups: 25
  sgh-mpm-context: auto
  inspection-recursion-limit: 3000

# Rules — load our custom Lighthouse rules
default-rule-path: /etc/suricata/rules
rule-files:
  - lighthouse.rules

# ── Flow/stream settings ─────────────────────────────────────────
# Flow records are emitted on flow EXPIRY. Short timeouts make attack flows
# (SYN floods, scans — all short-lived) surface within seconds so the rate
# aggregator's 10s window sees them DURING the attack, not minutes later.
# Trade-off: more flow records = slightly higher eve.json volume — acceptable
# for the throughput target (batched ML inference + bounded queue handle it).
flow:
  memcap: 128mb
  hash-size: 65536
  prealloc: 10000
  emergency-recovery: 30
  timeout:
    tcp:
      new: 10          # was 60  — flush half-open SYN-flood flows fast
      established: 30  # was 600 — real-time detection, not 10-min lag
      closed: 5        # was 60
    udp:
      new: 10          # was 30  — UDP flood visibility
      established: 30  # was 300
    icmp:
      new: 10          # was 30
      established: 30   # was 300

stream:
  memcap: 64mb
  checksum-validation: no
  inline: no
  reassembly:
    memcap: 256mb
    depth: 1mb
    toserver-chunk-size: 2560
    toclient-chunk-size: 2560
    randomize-chunk-size: yes

# ── App layer ────────────────────────────────────────────────────
app-layer:
  protocols:
    tls:
      enabled: yes
      detection-ports:
        dp: 443
    http:
      enabled: yes
      memcap: 64mb
    ftp:
      enabled: yes
    ssh:
      enabled: yes

# ── Logging ──────────────────────────────────────────────────────
logging:
  default-log-level: notice
  outputs:
    - console:
        enabled: yes
    - file:
        enabled: yes
        level: info
        filename: suricata.log
